# LocalStack endpoint override
quarkus.sqs.endpoint-override=http://localhost:4566
quarkus.secretsmanager.endpoint-override=http://localhost:4566
quarkus.dynamodb.endpoint-override=http://localhost:4566
quarkus.ssl.native=true

# Region (you said eu-central-1)
quarkus.aws.region=eu-central-1

#AWS related configuration
thesis.sqs.queue-name=thesis-events

# DynamoDB table names
thesis.dynamodb.ledger-table=thesis-ledger
thesis.dynamodb.dedup-table=thesis-dedup
thesis.dynamodb.dedup-ttl-seconds=86400

# Benchmark configuration
thesis.replay-check.window-ms=300000
thesis.replay-check.enabled=true

# Caching experiment: 0 (no cache) vs 60 (cache)
thesis.keys.cache.ttlSeconds=0
